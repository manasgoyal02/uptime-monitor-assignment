version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: uptime-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mongodb://db:27017/uptime_db
      PORT: 5000
      CRON_SCHEDULE: "* * * * *"
      REQUEST_TIMEOUT: 10000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uptime-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
